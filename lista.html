<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de usuários</title>
</head>
<body>

<h1>Lista de usuários</h1>

<table border="1">

    <thead>
        <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Ações</th>
        </tr>
    </thead>

    <tbody id="tabelaUsuarios"></tbody>

</table>

<script>

function listarUsuarios(){

    let listaUsuarios =
        JSON.parse(localStorage.getItem("db_usuarios")) || [];

    let tabela =
        document.getElementById("tabelaUsuarios");

    tabela.innerHTML = "";

    for(let i = 0; i < listaUsuarios.length; i++){

        tabela.innerHTML += `
            <tr>
                <td>${listaUsuarios[i].nome}</td>
                <td>${listaUsuarios[i].email}</td>
                <td>
                    <button onclick="editarUsuario(${i})">
                        Editar
                    </button>

                    <button onclick="excluirUsuario(${i})">
                        Excluir
                    </button>
                </td>
            </tr>
        `;
    }
}

function excluirUsuario(index){

    let listaUsuarios =
        JSON.parse(localStorage.getItem("db_usuarios"));

    listaUsuarios.splice(index, 1);

    localStorage.setItem(
        "db_usuarios",
        JSON.stringify(listaUsuarios)
    );

    listarUsuarios();
}

function editarUsuario(index){
    let listaUsuarios =
        JSON.parse(localStorage.getItem("db_usuarios")) || [];

    let usuario = listaUsuarios[index];
    if(!usuario) return;

    let novoNome = prompt("Nome:", usuario.nome);
    if(novoNome === null) return; // cancelado

    let novoEmail = prompt("Email:", usuario.email);
    if(novoEmail === null) return; // cancelado

    usuario.nome = novoNome.trim();
    usuario.email = novoEmail.trim();

    listaUsuarios[index] = usuario;

    localStorage.setItem("db_usuarios", JSON.stringify(listaUsuarios));

    listarUsuarios();
}

// inicializa listagem ao carregar a página
window.onload = listarUsuarios;

</script>

</body>
</html>
